[pytest]

addopts =
    -v
    --strict-markers
    --color=yes
    --cov=dqa
    --cov-report=term-missing
    --cov-report=term:skip-covered

testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

filterwarnings =
    error
    ignore::UserWarning
    ignore::DeprecationWarning

markers =
    unit: Tests unitarios aislados
    integration: Tests que usan I/O real (archivos)
    slow: Tests lentos (PyMC sampling)

[coverage:run]
source = dqa
omit =
    */tests/*
    */__pycache__/*

[coverage:report]
precision = 2
show_missing = True
exclude_lines =
    pragma: no cover
    def __repr__
    raise NotImplementedError
    if TYPE_CHECKING:
    @(abc\.)?abstractmethod
